services:
  - type: web
    name: recipe-extractor-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-planner-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: USE_LLM
        value: "true"
      - key: REQUIRE_LLM
        value: "true"
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false

databases:
  - name: recipe-planner-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
